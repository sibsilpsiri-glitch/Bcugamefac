<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คุณเหมาะกับการเป็นแฟนคณะไหน? | มหาวิทยาลัยเบงจันทร์</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-main: #2d2d2d;
            --text-muted: #888888;
            --card-bg: #ffffff;
            --primary: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        #app {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            min-height: 80vh;
            margin: 20px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            color: var(--primary);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* ปุ่มและตัวเลือก */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .option-btn {
            background: transparent;
            border: 2px solid #e0e0e0;
            color: var(--text-main);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-size: 15px;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #fafafa;
        }

        /* ส่วนแสดงผลต่างๆ */
        #quiz-screen, #result-screen {
            display: none;
            flex-direction: column;
            flex-grow: 1;
        }

        .active {
            display: flex !important;
            animation: fadeIn 0.5s ease;
        }

        .progress {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 30px;
            text-align: center;
        }

        /* หน้า Result */
        .result-header {
            text-align: center;
            padding: 30px 20px;
            border-radius: 16px;
            color: white;
            margin-bottom: 24px;
            transition: background 0.5s ease;
        }

        .faculty-name {
            font-size: 28px;
            font-weight: 600;
        }

        .result-desc {
            font-size: 15px;
            color: #444;
            text-align: justify;
            margin-bottom: 20px;
        }

        .role-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="active">
        <h1>คุณเหมาะกับการเป็นแฟนคณะไหน?</h1>
        <p class="subtitle"> คณะภายในมหาวิทยาลัยเบงจันทร์</p>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center;">
            <img src="https://cdn-icons-png.flaticon.com/512/8142/8142491.png" alt="heart" style="width: 120px; opacity: 0.8; margin-bottom: 40px;">
        </div>
        <button class="btn" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="quiz-screen">
        <div class="progress" id="progress">1 / 20</div>
        <div class="question-text" id="question">คำถามจะแสดงที่นี่</div>
        <div id="options"></div>
    </div>

    <div id="result-screen">
        <div class="result-header" id="result-header">
            <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">เนื้อคู่ของคุณคือเด็ก...</div>
            <div class="faculty-name" id="faculty-name">คณะชื่อ</div>
        </div>
        <div class="result-desc" id="result-desc">คำอธิบายยาวๆ</div>
        <div class="role-box" id="role-box">โพสิชันของคุณ: รุก/รับ</div>
        <button class="btn" onclick="location.reload()" style="background: #2d2d2d;">เล่นอีกครั้ง</button>
    </div>
</div>

<script>
    // ข้อมูลคณะ สี และคำทำนาย (อิงตามภาพที่ให้มา)
    const faculties = {
        eng: { name: "คณะวิศวกรรมศาสตร์", color: "#14113E", 
               desc: "คุณแพ้ทางคนที่มีความเป็นผู้นำ ดูดิบๆ ลุยๆ แต่ลึกๆ แล้วเป็นคนเทคแคร์เก่งมาก คุณเป็นคนที่ต้องการความมั่นคงและชอบคนที่มีเหตุผล การมีแฟนเป็นเด็กวิดวะจะทำให้คุณรู้สึกปลอดภัย เพราะถึงเขาจะปากแข็งหรือดูซึนๆ ไปบ้าง แต่ถ้าเป็นเรื่องของคุณ เขาพร้อมจะพุ่งชนและแก้ไขปัญหาให้เสมอ คุณชอบความสัมพันธ์ที่เติบโตไปด้วยกัน ลุยไหนลุยกัน ไม่ต้องประดิษฐ์เยอะ",
               role: "ตกเป็นฝ่าย 'รับ' อย่างเต็มใจ เพราะคุณแพ้ความคลั่งรักแบบเงียบๆ ของเขา" },
        sci: { name: "คณะวิทยาศาสตร์", color: "#F2803A", 
               desc: "คุณเป็นคนมีเหตุมีผลและชอบค้นหาความจริง คุณจึงเหมาะกับเด็กวิทย์ที่มีตรรกะเป็นเลิศ ชอบทดลอง และมองโลกตามความเป็นจริง ความสัมพันธ์ของคุณจะเป็นแบบค่อยเป็นค่อยไป อาศัยการเรียนรู้กันและกันเหมือนการทำวิจัย คุณจะหลงรักความฉลาดและการคิดวิเคราะห์ของเขา แม้บางครั้งเขาจะดูเนิร์ดหรือมุ่งมั่นกับบางสิ่งมากเกินไป แต่นั่นแหละคือเสน่ห์ที่คุณมองหา",
               role: "เป็น 'รุก' ในเรื่องอีโมชันนอล (คอยเติมความหวาน) และเป็น 'รับ' ในเรื่องการตัดสินใจ" },
        agr: { name: "คณะเกษตรศาสตร์", color: "#95A161", 
               desc: "คุณเป็นคนรักธรรมชาติ สบายๆ และเกลียดความวุ่นวาย คุณเหมาะกับเด็กเกษตรที่ใช้ชีวิตติดดิน เรียบง่าย และมีความอดทนสูงมากก คุณชอบคนที่อยู่ด้วยแล้วสบายใจ ไม่ต้องแต่งตัวหรูหราตลอดเวลา แค่จูงมือกันไปเดินเล่นหรือปลูกต้นไม้ด้วยกันก็มีความสุขแล้ว แฟนคณะนี้จะดูแลคุณดีเหมือนที่เขาดูแลต้นไม้และสัตว์ของเขา อบอุ่นและพึ่งพาได้เสมอ",
               role: "คุณมักจะได้เป็นฝ่าย 'รับ' เพราะเขาพร้อมจะอุ้มคุณและดูแลคุณประหนึ่งลูกเจี๊ยบตัวน้อย" },
        arch: { name: "คณะสถาปัตยกรรมศาสตร์ฯ", color: "#8E1313", 
               desc: "เด็กสถาปัตย์คือตัวแทนของความติสท์และการอดหลับอดนอน! คุณหลงใหลในคนที่มีแพสชั่น มีสไตล์ที่โดดเด่น และมีความคิดสร้างสรรค์ คุณเข้าใจธรรมชาติของคนทำงานศิลปะและพร้อมจะเป็นพื้นที่ปลอดภัยให้เขาในวันที่เขาปั่นโปรเจกต์จนหัวหมุน ความสัมพันธ์ของคุณจะเต็มไปด้วยสีสัน การไปเดทที่อาร์ตแกลเลอรี่ หรือคาเฟ่ชิคๆ คือทางของคุณ",
               role: "คุณต้องเป็นฝ่าย 'รุก' (ในการเข้าไปดูแลชีวิตเขา) เพราะแฟนคุณน่าจะลืมกินข้าวบ่อยมาก!" },
        fineart: { name: "คณะวิจิตรศิลป์", color: "#2B2A2A", 
               desc: "คุณมีอารมณ์ศิลปินซ่อนอยู่ และมีแรงดึงดูดกับคนที่มีเอกลักษณ์เฉพาะตัวสูง คาดเดาไม่ได้ และมีโลกส่วนตัว คุณเหมาะกับเด็กวิจิตรศิลป์ที่ใช้ความรู้สึกนำทางชีวิต ความรักของคุณทั้งคู่จะลึกซึ้ง โรแมนติกแบบมีชั้นเชิง และอาจจะดราม่านิดๆ พอเป็นสียสัน คุณชอบการแสดงออกทางความรักที่ผ่านผลงานศิลปะ บทเพลง หรือสายตา มากกว่าคำพูดธรรมดา",
               role: "สลับกัน 'รุก-รับ' ตามแต่อารมณ์และมวลความรู้สึกในแต่ละวัน" },
        music: { name: "คณะดุริยางคศาสตร์", color: "#6A2F8B", 
               desc: "แพ้ทางคนเล่นดนตรีใช่มั้ยล่ะ? คุณเป็นคนมีสุนทรียภาพในหัวใจ อ่อนไหว และโรแมนติก คุณเหมาะกับคนที่มีจังหวะในหัวใจ สามารถใช้เสียงเพลงปลอบประโลมคุณได้ในวันที่เหนื่อยล้า คุณชอบฟีลลิ่งของการนั่งมองแฟนซ้อมดนตรี หรือร้องเพลงให้ฟัง ความสัมพันธ์ของคุณจะมีแต่ความสุนทรีย์ แม้เขาจะอารมณ์ศิลปินไปบ้าง แต่เขาก็รักคุณหมดหัวใจ",
               role: "เป็น 'รับ' นั่งสวยๆ หล่อๆ รอฟังเขาร้องเพลงจีบคุณได้เลย" },
        comm: { name: "คณะนิเทศศาสตร์", color: "#F7E6F8", 
               desc: "คุณเป็นคนร่าเริง ชอบเข้าสังคม และชอบความโดดเด่น คุณเหมาะกับเด็กนิเทศที่เอนเนอร์จี้ล้นเหลือ คุยเก่ง เฟรนด์ลี่ และรู้ว่าต้องเอนเตอร์เทนคนรักยังไงให้มีความสุข คุณชอบความสัมพันธ์ที่หวือหวา มีอะไรเซอร์ไพรส์ตลอดเวลา ไปเดทกันทีก็ต้องมีคอนเทนต์ มีรูปสวยๆ ลงโซเชียล แฟนคณะนี้จะทำให้ชีวิตคุณไม่มีคำว่าน่าเบื่อ",
               role: "เป็น 'รุก' ในการคิดคอนเทนต์เดท และ 'รับ' การปรนนิบัติแบบซุปตาร์จากเขา" },
        law: { name: "คณะนิติศาสตร์", color: "#B18919", 
               desc: "คุณแพ้คนเก่ง คนเนี้ยบ และคนที่มีวาทศิลป์ คุณเหมาะกับเด็กนิติที่ดูสุขุม ภูมิฐาน และเป๊ะในทุกระเบียบนิ้ว คุณต้องการคนที่ปกป้องคุณได้ด้วยเหตุผลและกฎหมาย (ฮา) คุณชอบการถกเถียงเชิงตรรกะกับแฟน และรู้สึกภูมิใจเวลาที่เห็นเขาตั้งใจอ่านหนังสือหนาเป็นตั้งๆ ความสัมพันธ์นี้อาจจะดูจริงจัง แต่ลึกๆ เขามีมุมอ้อนที่ให้คุณเห็นแค่คนเดียว",
               role: "คุณต้องเป็น 'รุก' เพื่อทลายกำแพงความขรึมของเขา แล้วเขาจะยอมเป็นแมวน้อยให้คุณเอง" },
        human: { name: "คณะมนุษยศาสตร์และสังคมศาสตร์", color: "#A7DB60", 
               desc: "คุณเป็นผู้ฟังที่ดี มีความเห็นอกเห็นใจ และชอบการพูดคุยแบบ Deep Talk คุณเหมาะกับเด็กมนุษยฯ ที่เข้าใจโลก เข้าใจคน และมักจะมองเห็นความสวยงามในสิ่งเล็กๆ น้อยๆ ความสัมพันธ์ของคุณจะอบอุ่น ละมุนละไม เหมือนได้อ่านหนังสือดีๆ สักเล่ม คุณทั้งคู่พร้อมที่จะซัพพอร์ตความรู้สึกของกันและกันในทุกๆ เรื่อง",
               role: "เป็นฝ่าย 'รับ' พลังงานบวกและความใส่ใจที่เขาพร้อมจะเทให้คุณหมดหน้าตัก" },
        bus: { name: "คณะบริหารธุรกิจ", color: "#C62529", 
               desc: "คุณเป็นคนมีเป้าหมาย ทะเยอทะยาน และมองหาความมั่นคงในชีวิต คุณจึงเหมาะกับเด็กบริหารที่ดูดี มีความเป็นผู้นำ และเก่งเรื่องการจัดการ (รวมถึงจัดการหัวใจคุณด้วย) คุณชอบคนที่แต่งตัวดี มีคลาส และสามารถวางแผนอนาคตร่วมกับคุณได้ เขาอาจจะบ้างานบ้าง แต่เขาก็รู้ว่าต้องจัดสรรเวลามาดูแลคุณยังไงให้คุณรู้สึกเป็นคนพิเศษเสมอ",
               role: "เป็น 'รับ' ให้เขาเปย์และจัดการวางแผนทริปเดทเริ่ดๆ ให้คุณ" },
        edu: { name: "คณะครุศาสตร์", color: "#DFAC49", 
               desc: "คุณมีความเป็นเด็กในตัวสูง และโหยหาคนที่พร้อมจะเข้าใจและสอนคุณอย่างใจเย็น คุณเหมาะกับเด็กครุศาสตร์ที่มีจิตวิทยา อบอุ่น มีความเป็นผู้ใหญ่ (แม้บางครั้งจะแอบขี้บ่นเหมือนแม่) เขาพร้อมที่จะรับฟัง อบรม และดูแลคุณอย่างดีที่สุด ความสัมพันธ์นี้จะเป็นความรักที่บริสุทธิ์ หวังดีต่อกัน และพร้อมที่จะจับมือกันข้ามผ่านทุกปัญหา",
               role: "เป็น 'รับ' แบบเด็กดื้อที่รอให้ครูมาดุและลูบหัวด้วยความเอ็นดู" },
        med: { name: "คณะแพทยศาสตร์", color: "#92B9CD", 
               desc: "คุณเป็นคนใจกว้าง มีวุฒิภาวะสูง และมีความเสียสละ คุณถึงเหมาะกับเด็กหมอ! คุณรู้ดีว่าเขาไม่มีเวลาให้คุณตลอด 24 ชั่วโมงเพราะเขาต้องไปดูแลคนอื่น แต่คุณก็ภูมิใจในตัวเขา คุณชอบคนเก่ง คนที่ดูสะอาดสะอ้าน และเอาใจใส่สุขภาพ เวลาเขาว่างเมื่อไหร่ เขาจะชดเชยเวลาที่หายไปให้คุณอย่างคุ้มค่าที่สุดแน่นอน",

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        const qData = questions[currentQ];
        document.getElementById('progress').innerText = `คำถามที่ ${currentQ + 1} / ${questions.length}`;
        document.getElementById('question').innerText = qData.q;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        qData.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.score);
            optionsDiv.appendChild(btn);
        });
    }

    function selectOption(scoreObj) {
        // บวกคะแนนให้คณะต่างๆ ตามที่ตั้งไว้
        for (let fac in scoreObj) {
            scores[fac] += scoreObj[fac];
        }
        
        currentQ++;
        if (currentQ < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        
        // หาคณะที่ได้คะแนนสูงสุด
        let topFaculty = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        let resultData = faculties[topFaculty];

        // เซ็ตข้อมูลหน้า Result
        document.getElementById('faculty-name').innerText = resultData.name;
        document.getElementById('result-header').style.backgroundColor = resultData.color;
        document.getElementById('result-desc').innerText = resultData.desc;
        document.getElementById('role-box').innerHTML = `<strong>โพสิชันของคุณคือ:</strong><br>${resultData.role}`;
    }
